services:
  postgres:
    image: postgres:16
    container_name: devfolio_postgres
    environment:
      POSTGRES_USER: devfolio
      POSTGRES_PASSWORD: devfolio
      POSTGRES_DB: devfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devfolio']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devfolio_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devfolio_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devfolio:devfolio@postgres:5432/devfolio
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src/database/migrations:/app/apps/api/src/database/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devfolio_web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

  export-worker:
    build:
      context: .
      dockerfile: workers/export/Dockerfile
    container_name: devfolio_export_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devfolio:devfolio@postgres:5432/devfolio
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
