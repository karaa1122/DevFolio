services:
  postgres:
    image: postgres:16
    container_name: devfolio_postgres_dev
    environment:
      POSTGRES_USER: devfolio
      POSTGRES_PASSWORD: devfolio
      POSTGRES_DB: devfolio
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devfolio']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devfolio_redis_dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: devfolio_mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_dev_data:
  redis_dev_data:
